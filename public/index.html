<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MyTube PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
}

.header{
background:#202020;
padding:15px;
display:flex;
align-items:center;
}

.logo{
font-size:24px;
font-weight:bold;
color:red;
margin-right:20px;
}

.video-card{
background:#181818;
border-radius:10px;
padding:10px;
margin-bottom:20px;
transition:0.3s;
}

.video-card:hover{
transform:scale(1.05);
}

.thumbnail{
width:100%;
border-radius:10px;
}

.title{
font-size:16px;
margin-top:8px;
}
</style>

</head>

<body>

<div class="header">

<div class="logo">MyTube</div>

<input class="form-control w-50" id="search" placeholder="Search video...">

<button class="btn btn-danger ms-2" onclick="search()">Search</button>

</div>

<div class="container mt-4">

<div class="row" id="videos"></div>

</div>

<script>

async function search(){

let q=document.getElementById("search").value

let res=await fetch("/api/search?q="+q)

let data=await res.json()

let html=""

data.items.forEach(v=>{

html+=`

<div class="col-md-3">

<div class="video-card">

<img class="thumbnail" src="${v.snippet.thumbnails.medium.url}">

<div class="title">${v.snippet.title}</div>

</div>

</div>

`

})

document.getElementById("videos").innerHTML=html

}

</script>

</body>
</html>
