<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>MyTube PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
}

.header{
position:fixed;
top:0;
width:100%;
height:60px;
background:#202020;
display:flex;
align-items:center;
padding:0 15px;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
color:red;
margin-right:20px;
}

.sidebar{
position:fixed;
top:60px;
left:0;
width:220px;
height:100%;
background:#181818;
padding:10px;
}

.menu-item{
padding:10px;
cursor:pointer;
border-radius:6px;
}

.menu-item:hover{
background:#303030;
}

.content{
margin-left:220px;
margin-top:70px;
padding:20px;
}

.video-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.video-card{
cursor:pointer;
}

.video-card img{
width:100%;
border-radius:10px;
}

.title{
margin-top:6px;
font-size:14px;
}

.player-layout{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.suggest{
display:flex;
margin-bottom:10px;
cursor:pointer;
}

.suggest img{
width:120px;
border-radius:6px;
}

.suggest-title{
margin-left:10px;
font-size:13px;
}

.comment{
background:#181818;
padding:6px;
margin-top:6px;
border-radius:5px;
}

.shorts{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">MyTube</div>

<input id="search" class="form-control w-50" placeholder="Search video">

<button class="btn btn-danger ms-2" onclick="search()">Search</button>

</div>

<div class="sidebar">

<div class="menu-item" onclick="loadHome()">🏠 Home</div>
<div class="menu-item" onclick="loadTrending()">🔥 Trending</div>
<div class="menu-item" onclick="loadShorts()">📱 Shorts</div>
<div class="menu-item" onclick="loadHistory()">🕘 History</div>

</div>

<div class="content">

<div id="page"></div>

</div>

<script>

const API_KEY="AIzaSyD1OCPoOG0tEmPqlkauPWstNwpMY_b93Ac"

let currentVideo=""

function renderGrid(videos){

let html='<div class="video-grid">'

videos.forEach(v=>{

let id=v.id.videoId||v.id
let thumb=v.snippet.thumbnails.medium.url
let title=v.snippet.title

html+=`

<div class="video-card" onclick="play('${id}')">
<img src="${thumb}">
<div class="title">${title}</div>
</div>

`

})

html+='</div>'

document.getElementById("page").innerHTML=html

}

async function loadHome(){

let url=`https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&maxResults=16&regionCode=VN&key=${API_KEY}`

let res=await fetch(url)

let data=await res.json()

renderGrid(data.items)

}

function loadTrending(){
loadHome()
}

async function search(){

let q=document.getElementById("search").value

let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=16&q=${q}&key=${API_KEY}`

let res=await fetch(url)

let data=await res.json()

renderGrid(data.items)

}

async function play(id){

currentVideo=id

let html=`

<div class="player-layout">

<div>

<iframe width="100%" height="450"
src="https://www.youtube.com/embed/${id}"
frameborder="0" allowfullscreen></iframe>

<button class="btn btn-danger mt-2" onclick="like()">👍 Like <span id="likes">0</span></button>

<div class="mt-4">

<h5>Comments</h5>

<input id="commentText" class="form-control">

<button class="btn btn-primary mt-2" onclick="addComment()">Send</button>

<div id="comments"></div>

</div>

</div>

<div>

<h5>Suggested</h5>

<div id="suggest"></div>

</div>

</div>

`

document.getElementById("page").innerHTML=html

loadSuggested(id)
loadLikes()
loadComments()

}

async function loadSuggested(id){

let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&relatedToVideoId=${id}&maxResults=10&key=${API_KEY}`

let res=await fetch(url)

let data=await res.json()

let html=""

data.items.forEach(v=>{

let vid=v.id.videoId
let thumb=v.snippet.thumbnails.medium.url
let title=v.snippet.title

html+=`

<div class="suggest" onclick="play('${vid}')">
<img src="${thumb}">
<div class="suggest-title">${title}</div>
</div>

`

})

document.getElementById("suggest").innerHTML=html

}

function like(){

let likes=JSON.parse(localStorage.getItem("likes")||"{}")

likes[currentVideo]=(likes[currentVideo]||0)+1

localStorage.setItem("likes",JSON.stringify(likes))

loadLikes()

}

function loadLikes(){

let likes=JSON.parse(localStorage.getItem("likes")||"{}")

document.getElementById("likes").innerText=likes[currentVideo]||0

}

function addComment(){

let text=document.getElementById("commentText").value

if(!text) return

let comments=JSON.parse(localStorage.getItem("comments")||"{}")

if(!comments[currentVideo]) comments[currentVideo]=[]

comments[currentVideo].push(text)

localStorage.setItem("comments",JSON.stringify(comments))

document.getElementById("commentText").value=""

loadComments()

}

function loadComments(){

let comments=JSON.parse(localStorage.getItem("comments")||"{}")

let list=comments[currentVideo]||[]

let html=""

list.forEach(c=>{
html+=`<div class="comment">${c}</div>`
})

document.getElementById("comments").innerHTML=html

}

async function loadShorts(){

let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&q=shorts&maxResults=10&key=${API_KEY}`

let res=await fetch(url)

let data=await res.json()

let html='<div class="shorts">'

data.items.forEach(v=>{

let id=v.id.videoId

html+=`
<iframe width="100%" height="350"
src="https://www.youtube.com/embed/${id}"
frameborder="0"></iframe>
`

})

html+='</div>'

document.getElementById("page").innerHTML=html

}

loadHome()

</script>

</body>
</html>
