<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>MyTube PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
}

.header{
background:#202020;
height:60px;
display:flex;
align-items:center;
padding:10px;
}

.logo{
font-size:22px;
font-weight:bold;
color:red;
margin-right:20px;
}

.main{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
padding:20px;
}

.player iframe{
width:100%;
height:450px;
border-radius:10px;
}

.suggest-video{
display:flex;
margin-bottom:10px;
cursor:pointer;
}

.suggest-video img{
width:160px;
border-radius:8px;
}

.suggest-title{
margin-left:10px;
font-size:14px;
}

.comment{
background:#181818;
padding:8px;
margin-top:6px;
border-radius:6px;
}

.user{
margin-left:auto;
display:flex;
align-items:center;
gap:10px;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">MyTube</div>

<input id="search" class="form-control w-50" placeholder="Search video">

<button class="btn btn-danger ms-2" onclick="search()">Search</button>

<div class="user">

<div id="g_id_onload"
 data-client_id="159978427672-ea3r930f5v3nmkd5ptn2rb45p7aadbkj.apps.googleusercontent.com"
 data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"
 data-type="standard"
 data-size="medium">
</div>

<div id="user"></div>

</div>

</div>

<div class="main">

<div>

<div class="player" id="player"></div>

<h4 id="title"></h4>

<button class="btn btn-light" onclick="like()">👍 Like <span id="likes">0</span></button>

<div style="margin-top:20px">

<h5>Comments</h5>

<input id="commentText" class="form-control" placeholder="Write comment">

<button class="btn btn-primary mt-2" onclick="addComment()">Comment</button>

<div id="comments"></div>

</div>

</div>

<div>

<h5>Suggested Videos</h5>

<div id="suggest"></div>

</div>

</div>

<script>

const API_KEY="AIzaSyD1OCPoOG0tEmPqlkauPWstNwpMY_b93Ac"

let currentVideo=""
let userLoggedIn=false
let userName=""

/* SEARCH */

async function search(){

let q=document.getElementById("search").value

let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&q=${q}&maxResults=5&key=${API_KEY}`

let res=await fetch(url)
let data=await res.json()

if(data.items.length>0){

let v=data.items[0]

play(v.id.videoId,v.snippet.title)

}

}

/* PLAY VIDEO */

function play(id,title){

currentVideo=id

document.getElementById("player").innerHTML=
`<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`

document.getElementById("title").innerText=title

loadSuggested(id)

loadLikes()

loadComments()

}

/* SUGGESTED */

async function loadSuggested(id){

let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&relatedToVideoId=${id}&maxResults=10&key=${API_KEY}`

let res=await fetch(url)
let data=await res.json()

let html=""

data.items.forEach(v=>{

if(!v.id.videoId) return

let vid=v.id.videoId
let thumb=v.snippet.thumbnails.medium.url
let title=v.snippet.title

html+=`

<div class="suggest-video" onclick="play('${vid}',\`${title}\`)">

<img src="${thumb}">

<div class="suggest-title">${title}</div>

</div>

`

})

document.getElementById("suggest").innerHTML=html

}

/* LIKE */

function like(){

let likes=JSON.parse(localStorage.getItem("likes")||"{}")

likes[currentVideo]=(likes[currentVideo]||0)+1

localStorage.setItem("likes",JSON.stringify(likes))

loadLikes()

}

function loadLikes(){

let likes=JSON.parse(localStorage.getItem("likes")||"{}")

document.getElementById("likes").innerText=likes[currentVideo]||0

}

/* COMMENT */

function addComment(){

if(!userLoggedIn){

alert("Bạn phải đăng nhập Google mới comment được")

return
}

let text=document.getElementById("commentText").value

if(!text) return

let comments=JSON.parse(localStorage.getItem("comments")||"{}")

if(!comments[currentVideo]) comments[currentVideo]=[]

comments[currentVideo].push(userName+": "+text)

localStorage.setItem("comments",JSON.stringify(comments))

document.getElementById("commentText").value=""

loadComments()

}

function loadComments(){

let comments=JSON.parse(localStorage.getItem("comments")||"{}")

let list=comments[currentVideo]||[]

let html=""

list.forEach(c=>{
html+=`<div class="comment">${c}</div>`
})

document.getElementById("comments").innerHTML=html

}

/* GOOGLE LOGIN */

function handleCredentialResponse(response){

const data=parseJwt(response.credential)

userLoggedIn=true
userName=data.name

document.getElementById("user").innerHTML=
`<img src="${data.picture}" style="width:35px;border-radius:50%"> ${data.name}`

}

/* JWT */

function parseJwt(token){

var base64Url=token.split('.')[1]
var base64=base64Url.replace(/-/g,'+').replace(/_/g,'/')

var jsonPayload=decodeURIComponent(atob(base64).split('').map(function(c){
return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)
}).join(''))

return JSON.parse(jsonPayload)

}

</script>

</body>

</html>
