<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>MyTube PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
}

.header{
background:#202020;
height:60px;
display:flex;
align-items:center;
padding:10px;
}

.logo{
color:red;
font-weight:bold;
font-size:22px;
margin-right:20px;
}

.container-main{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
padding:20px;
}

.video-player iframe{
width:100%;
height:450px;
border-radius:10px;
}

.video-title{
font-size:20px;
margin-top:10px;
}

.actions{
margin-top:10px;
display:flex;
gap:10px;
}

.suggest-video{
display:flex;
margin-bottom:10px;
cursor:pointer;
}

.suggest-video img{
width:160px;
border-radius:8px;
}

.suggest-title{
margin-left:10px;
font-size:14px;
}

.comment-box{
margin-top:20px;
}

.comment{
background:#181818;
padding:8px;
margin-top:6px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">MyTube</div>

<input id="search" class="form-control w-50" placeholder="Search video">

<button class="btn btn-danger ms-2" onclick="search()">Search</button>

</div>

<div class="container-main">

<div>

<div class="video-player" id="player"></div>

<div class="video-title" id="title"></div>

<div class="actions">

<button class="btn btn-light" onclick="like()">👍 Like <span id="likes">0</span></button>

<button class="btn btn-light">↗ Share</button>

<button class="btn btn-light">⬇ Download</button>

</div>

<div class="comment-box">

<h5>Comments</h5>

<input id="commentText" class="form-control" placeholder="Write comment">

<button class="btn btn-primary mt-2" onclick="addComment()">Comment</button>

<div id="comments"></div>

</div>

</div>

<div>

<h5>Suggested Videos</h5>

<div id="suggest"></div>

</div>

</div>

<script>

const API_KEY="AIzaSyD1OCPoOG0tEmPqlkauPWstNwpMY_b93Ac"

let currentVideo=""

async function search(){

let q=document.getElementById("search").value

let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&q=${q}&maxResults=1&key=${API_KEY}`

let res=await fetch(url)

let data=await res.json()

let video=data.items[0]

play(video.id.videoId,video.snippet.title)

}

function play(id,title){

currentVideo=id

document.getElementById("player").innerHTML=

`<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`

document.getElementById("title").innerText=title

loadSuggested(id)

loadLikes()

loadComments()

}

async function loadSuggested(id){

let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&relatedToVideoId=${id}&maxResults=10&key=${API_KEY}`

let res=await fetch(url)

let data=await res.json()

let html=""

data.items.forEach(v=>{

let vid=v.id.videoId
let thumb=v.snippet.thumbnails.medium.url
let title=v.snippet.title

html+=`

<div class="suggest-video" onclick="play('${vid}','${title}')">

<img src="${thumb}">

<div class="suggest-title">${title}</div>

</div>

`

})

document.getElementById("suggest").innerHTML=html

}

function like(){

let likes=JSON.parse(localStorage.getItem("likes")||"{}")

likes[currentVideo]=(likes[currentVideo]||0)+1

localStorage.setItem("likes",JSON.stringify(likes))

loadLikes()

}

function loadLikes(){

let likes=JSON.parse(localStorage.getItem("likes")||"{}")

document.getElementById("likes").innerText=likes[currentVideo]||0

}

function addComment(){

let text=document.getElementById("commentText").value

if(!text) return

let comments=JSON.parse(localStorage.getItem("comments")||"{}")

if(!comments[currentVideo]) comments[currentVideo]=[]

comments[currentVideo].push(text)

localStorage.setItem("comments",JSON.stringify(comments))

document.getElementById("commentText").value=""

loadComments()

}

function loadComments(){

let comments=JSON.parse(localStorage.getItem("comments")||"{}")

let list=comments[currentVideo]||[]

let html=""

list.forEach(c=>{
html+=`<div class="comment">${c}</div>`
})

document.getElementById("comments").innerHTML=html

}

</script>

</body>
</html>
