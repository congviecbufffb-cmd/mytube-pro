<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>MyTube PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
}

.header{
background:#202020;
padding:15px;
display:flex;
align-items:center;
}

.logo{
font-size:24px;
font-weight:bold;
color:red;
margin-right:20px;
}

.video-card{
background:#181818;
border-radius:10px;
padding:10px;
margin-bottom:20px;
transition:0.3s;
cursor:pointer;
}

.video-card:hover{
transform:scale(1.05);
}

.thumbnail{
width:100%;
border-radius:10px;
}

.title{
font-size:15px;
margin-top:8px;
}

.player{
margin-bottom:30px;
}

.user{
margin-left:auto;
display:flex;
align-items:center;
gap:10px;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">MyTube</div>

<input id="search" class="form-control w-50" placeholder="Search video">

<button class="btn btn-danger ms-2" onclick="search()">Search</button>

<div class="user">

<div id="g_id_onload"
 data-client_id="159978427672-ea3r930f5v3nmkd5ptn2rb45p7aadbkj.apps.googleusercontent.com"
 data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"
 data-type="standard"
 data-size="medium">
</div>

<div id="user"></div>

</div>

</div>

<div class="container mt-4">

<div id="player" class="player"></div>

<div class="row" id="videos"></div>

</div>

<script>

const API_KEY="AIzaSyD1OCPoOG0tEmPqlkauPWstNwpMY_b93Ac"

async function loadRecommended(){

let url=`https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&maxResults=12&regionCode=VN&key=${API_KEY}`

let res=await fetch(url)

let data=await res.json()

let html=""

data.items.forEach(v=>{

let id=v.id
let thumb=v.snippet.thumbnails.medium.url
let title=v.snippet.title

html+=`

<div class="col-md-3">

<div class="video-card" onclick="play('${id}')">

<img class="thumbnail" src="${thumb}">

<div class="title">${title}</div>

</div>

</div>

`

})

document.getElementById("videos").innerHTML=html

}

async function search(){

let q=document.getElementById("search").value

let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=12&q=${q}&key=${API_KEY}`

let res=await fetch(url)

let data=await res.json()

let html=""

data.items.forEach(v=>{

let id=v.id.videoId
let thumb=v.snippet.thumbnails.medium.url
let title=v.snippet.title

html+=`

<div class="col-md-3">

<div class="video-card" onclick="play('${id}')">

<img class="thumbnail" src="${thumb}">

<div class="title">${title}</div>

</div>

</div>

`

})

document.getElementById("videos").innerHTML=html

}

function play(id){

document.getElementById("player").innerHTML=

`<iframe width="100%" height="450"
src="https://www.youtube.com/embed/${id}"
frameborder="0" allowfullscreen></iframe>`

window.scrollTo(0,0)

}

function handleCredentialResponse(response){

const data=parseJwt(response.credential)

document.getElementById("user").innerHTML=

`<img src="${data.picture}" style="width:35px;border-radius:50%"> ${data.name}`

}

function parseJwt (token) {

var base64Url = token.split('.')[1]

var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/')

var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {

return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)

}).join(''))

return JSON.parse(jsonPayload)

}

loadRecommended()

</script>

</body>
</html>
